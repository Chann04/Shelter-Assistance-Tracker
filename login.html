<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Staff Login - Shelter Assistance Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                50: "#f1f7fb",
                100: "#e2eef7",
                200: "#bcd8ea",
                300: "#8fbbd9",
                400: "#5d99c4",
                500: "#3a7eb0",
                600: "#2d6594",
                700: "#265178",
                800: "#1f405e",
                900: "#172e44",
              },
            },
          },
        },
      };
    </script>
    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";
      window.supabaseCreateClient = createClient;
    </script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-800 font-sans antialiased">
    <main class="min-h-screen flex items-center justify-center px-4 py-10">
      <section class="w-full max-w-md bg-white rounded-2xl border border-slate-200 shadow-soft p-6">
        <h1 class="text-xl font-semibold text-slate-900">Staff Login</h1>
        <p class="text-sm text-slate-500 mt-1 mb-5">
          Sign in to continue to the Shelter Assistance Tracker dashboard.
        </p>

        <p id="auth-status" class="text-xs text-slate-500 mb-4">Not signed in</p>

        <form id="login-form" class="space-y-4" novalidate>
          <div>
            <label for="login-email" class="block text-sm font-medium text-slate-700 mb-1">Email</label>
            <input
              id="login-email"
              name="email"
              type="email"
              value="chanshan04@gmail.com"
              required
              autocomplete="email"
              class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm shadow-sm placeholder:text-slate-400 focus:border-brand-500 focus:ring-2 focus:ring-brand-200 focus:outline-none"
            />
          </div>
          <div>
            <label for="login-password" class="block text-sm font-medium text-slate-700 mb-1">Password</label>
            <input
              id="login-password"
              name="password"
              type="password"
              value="shandiechua04"
              required
              autocomplete="current-password"
              class="w-full rounded-lg border border-slate-300 px-3 py-2 text-sm shadow-sm placeholder:text-slate-400 focus:border-brand-500 focus:ring-2 focus:ring-brand-200 focus:outline-none"
            />
          </div>
          <button
            type="submit"
            class="w-full inline-flex items-center justify-center rounded-lg bg-brand-600 px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-brand-700 focus:outline-none focus:ring-2 focus:ring-brand-300 focus:ring-offset-2 transition"
          >
            Log In
          </button>
        </form>

        <a
          href="index.html"
          class="mt-4 inline-flex items-center text-sm text-brand-700 hover:text-brand-800"
        >
          Back to homepage
        </a>
      </section>
    </main>
    <div
      id="toast-container"
      class="fixed bottom-6 right-6 z-50 flex flex-col gap-2"
      aria-live="polite"
      aria-atomic="true"
    ></div>
    <script type="module" src="app.js"></script>
  </body>
</html>
